services:
  - type: web
    name: cloud-lover-prototype
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROVIDER_ORDER
        value: gemini,codex
      - key: ENABLE_CODEX_PROVIDER
        value: "1"
      - key: ENABLE_MOCK_FALLBACK
        value: "0"
      - key: EXPOSE_DEBUG
        value: "0"
      - key: ENABLE_PROVIDER_STATUS
        value: "0"
      - key: ALLOWED_ORIGINS
        value: https://cloud-lover-prototype.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PROVIDER_TIMEOUT_MS
        value: "60000"
      - key: CODEX_TIMEOUT_MS
        value: "5000"
      - key: CODEX_MODEL
        value: gpt-5.3-codex-spark
      - key: CACHE_TTL_MS
        value: "120000"
      - key: PROVIDER_COOLDOWN_MS
        value: "60000"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "30"
      - key: BODY_LIMIT_BYTES
        value: "65536"
