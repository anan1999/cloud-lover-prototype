services:
  - type: web
    name: cloud-lover-prototype
    runtime: node
    buildCommand: ""
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROVIDER_ORDER
        value: gemini,openrouter,nvidia,groq,mock
      - key: EXPOSE_DEBUG
        value: "0"
      - key: ENABLE_PROVIDER_STATUS
        value: "0"
      - key: ALLOWED_ORIGINS
        value: https://cloud-lover-prototype.onrender.com
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: NVIDIA_MODEL
        value: google/gemma-3n-e2b-it
      - key: PROVIDER_TIMEOUT_MS
        value: "12000"
      - key: CACHE_TTL_MS
        value: "120000"
      - key: PROVIDER_COOLDOWN_MS
        value: "60000"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "30"
      - key: BODY_LIMIT_BYTES
        value: "65536"
