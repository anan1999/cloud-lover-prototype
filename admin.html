<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>雲端戀人後台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1214;
      --panel: #171d20;
      --panel-soft: #20282c;
      --line: rgba(255,255,255,.12);
      --text: #f5f1e8;
      --muted: #a8b3b4;
      --teal: #44d6c9;
      --coral: #ff8d76;
      --gold: #f0c96d;
      --danger: #ff7171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; border: 0; }
    .shell { min-height: 100vh; display: grid; grid-template-columns: 240px 1fr; }
    .nav {
      border-right: 1px solid var(--line);
      background: #121719;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .brand { display: grid; gap: 6px; }
    .brand strong { font-size: 20px; }
    .brand span, .muted { color: var(--muted); font-size: 13px; }
    .nav a, .ghost {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border-radius: 8px;
      color: var(--text);
      background: var(--panel-soft);
      border: 1px solid var(--line);
      text-decoration: none;
    }
    .main { padding: 22px; display: grid; gap: 18px; align-content: start; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1, h2, p { margin: 0; }
    h1 { font-size: 24px; }
    h2 { font-size: 16px; margin-bottom: 12px; }
    .section-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .section-head h2 { margin: 0; }
    .grid { display: grid; gap: 14px; }
    .metrics { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .two { grid-template-columns: minmax(0, 1.2fr) minmax(320px, .8fr); }
    .three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      overflow: hidden;
    }
    .metric { display: grid; gap: 8px; min-height: 92px; }
    .metric span { color: var(--muted); font-size: 13px; }
    .metric strong { font-size: 28px; line-height: 1; }
    .eval-metric {
      min-height: 76px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
    }
    .bars { display: grid; gap: 9px; }
    .bar-row { display: grid; grid-template-columns: 92px 1fr 44px; gap: 10px; align-items: center; font-size: 13px; color: var(--muted); }
    .bar { height: 9px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
    .bar span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--teal), var(--gold)); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 500; }
    td.content { max-width: 520px; line-height: 1.45; }
    .pill { display: inline-flex; min-height: 24px; align-items: center; padding: 0 8px; border-radius: 999px; background: var(--panel-soft); color: var(--muted); }
    .pill.danger { color: #ffd7d7; background: rgba(255,113,113,.16); }
    .pill.good { color: #bff6e9; background: rgba(68,214,201,.16); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; }
    .toolbar label { min-width: 150px; }
    .toolbar button { min-height: 42px; padding: 0 14px; }
    .issue-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .score { font-size: 32px; line-height: 1; }
    .score.good { color: var(--teal); }
    .score.warn { color: var(--gold); }
    .score.bad { color: var(--danger); }
    .login {
      max-width: 420px;
      margin: 8vh auto;
      display: grid;
      gap: 12px;
    }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 13px; }
    input, select {
      min-height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }
    select option { background: #20282c; color: var(--text); }
    input:focus, select:focus { border-color: var(--teal); }
    .primary {
      min-height: 42px;
      border-radius: 8px;
      color: #101416;
      background: var(--teal);
      font-weight: 700;
    }
    .hidden { display: none !important; }
    @media (max-width: 920px) {
      .shell { grid-template-columns: 1fr; }
      .nav { border-right: 0; border-bottom: 1px solid var(--line); }
      .metrics, .two, .three { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <section class="login card" id="loginPanel">
    <div class="brand">
      <strong>工程後台</strong>
      <span>使用管理員帳號登入查看產品數據。</span>
    </div>
    <label>Email
      <input id="email" type="email" autocomplete="email" placeholder="admin@example.com">
    </label>
    <label>密碼
      <input id="password" type="password" autocomplete="current-password" placeholder="你的帳號密碼">
    </label>
    <button class="primary" id="loginBtn">登入後台</button>
    <p class="muted" id="loginStatus">需要在 Render 設定 ADMIN_EMAILS 才能進入。</p>
  </section>

  <main class="shell hidden" id="dashboard">
    <aside class="nav">
      <div class="brand">
        <strong>雲端戀人</strong>
        <span id="adminName">工程後台</span>
      </div>
      <a href="/">使用者前台</a>
      <button class="ghost" id="refreshBtn">重新整理</button>
      <button class="ghost" id="logoutBtn">登出</button>
    </aside>

    <section class="main">
      <div class="topbar">
        <div>
          <h1>使用狀況 Dashboard</h1>
          <p class="muted" id="updatedAt">尚未更新</p>
        </div>
        <span class="pill" id="statusPill">連線中</span>
      </div>

      <section class="grid metrics" id="metrics"></section>

      <section class="card">
        <div class="section-head">
          <div>
            <h2>Samantha 訓練評估</h2>
            <p class="muted" id="evalStatus">可以用固定劇本或 LLM 測試官跑一輪對話測試。</p>
          </div>
          <span class="pill" id="evalLatestPill">尚未測試</span>
        </div>
        <div class="toolbar">
          <label>測試場景
            <select id="evalScenario"></select>
          </label>
          <label>輪數
            <input id="evalTurns" type="number" min="30" max="90" value="60">
          </label>
          <button class="primary" id="runScriptedBtn">跑固定劇本</button>
          <button class="ghost" id="runLlmBtn">跑 LLM 測試官</button>
        </div>
        <div class="grid three" id="evalMetrics" style="margin-top:14px;"></div>
        <div class="bars" id="evalTrend" style="margin-top:14px;"></div>
      </section>

      <section class="grid two">
        <div class="card">
          <h2>最近評估 Run</h2>
          <table>
            <thead><tr><th>時間</th><th>模式</th><th>場景</th><th>分數</th><th>問題</th></tr></thead>
            <tbody id="evalRunRows"></tbody>
          </table>
        </div>
        <div class="card">
          <h2>最新逐輪對話</h2>
          <table>
            <thead><tr><th>輪</th><th>角色</th><th>內容</th><th>分數</th></tr></thead>
            <tbody id="evalMessageRows"></tbody>
          </table>
        </div>
      </section>

      <section class="grid two">
        <div class="card">
          <h2>近 14 天訊息量</h2>
          <div class="bars" id="dailyBars"></div>
        </div>
        <div class="card">
          <h2>模型供應商使用</h2>
          <div class="bars" id="providerBars"></div>
        </div>
      </section>

      <section class="grid two">
        <div class="card">
          <h2>情緒分布</h2>
          <div class="bars" id="emotionBars"></div>
        </div>
        <div class="card">
          <h2>情緒強度趨勢</h2>
          <div class="bars" id="emotionDailyBars"></div>
        </div>
      </section>

      <section class="grid two">
        <div class="card">
          <h2>角色關係</h2>
          <table>
            <thead><tr><th>使用者</th><th>角色</th><th>親密</th><th>信任</th><th>互動</th><th>最近情緒</th></tr></thead>
            <tbody id="relationshipRows"></tbody>
          </table>
        </div>
        <div class="card">
          <h2>最近情緒事件</h2>
          <table>
            <thead><tr><th>時間</th><th>使用者</th><th>情緒</th><th>強度</th><th>需求</th></tr></thead>
            <tbody id="emotionRows"></tbody>
          </table>
        </div>
      </section>

      <section class="grid two">
        <div class="card">
          <h2>最近聊天</h2>
          <table>
            <thead><tr><th>時間</th><th>使用者</th><th>角色</th><th>內容</th><th>狀態</th></tr></thead>
            <tbody id="messageRows"></tbody>
          </table>
        </div>
        <div class="card">
          <h2>最近註冊</h2>
          <table>
            <thead><tr><th>時間</th><th>Email</th><th>暱稱</th></tr></thead>
            <tbody id="userRows"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script>
    const $ = selector => document.querySelector(selector);
    const fmt = value => new Intl.DateTimeFormat("zh-TW", { dateStyle: "short", timeStyle: "short" }).format(new Date(value));
    const escapeHtml = text => String(text ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[char]);
    let evaluationScenarios = {};

    async function request(path, options = {}) {
      const response = await fetch(path, {
        credentials: "include",
        headers: options.body ? { "Content-Type": "application/json" } : {},
        ...options
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
      return data;
    }

    async function login() {
      $("#loginStatus").textContent = "登入中...";
      try {
        await request("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({ email: $("#email").value.trim(), password: $("#password").value })
        });
        await loadStats();
      } catch (error) {
        $("#loginStatus").textContent = error.message === "Admin access required"
          ? "這個帳號不是後台管理員，請檢查 ADMIN_EMAILS。"
          : `登入失敗：${error.message}`;
      }
    }

    async function logout() {
      await request("/api/auth/logout", { method: "POST", body: "{}" }).catch(() => {});
      $("#dashboard").classList.add("hidden");
      $("#loginPanel").classList.remove("hidden");
    }

    function renderMetrics(overview) {
      const items = [
        ["使用者", overview.users],
        ["總訊息", overview.messages],
        ["活躍 Session", overview.active_sessions],
        ["記憶數", overview.memories],
        ["使用者訊息", overview.user_messages],
        ["AI 回覆", overview.lover_messages],
        ["情緒事件", overview.emotion_events],
        ["依賴風險", overview.dependency_risk_messages],
        ["危機訊息", overview.crisis_messages]
      ];
      $("#metrics").innerHTML = items.map(([label, value]) => `
        <div class="card metric"><span>${label}</span><strong>${Number(value || 0).toLocaleString()}</strong></div>
      `).join("");
    }

    function renderBars(selector, rows, labelKey) {
      const max = Math.max(1, ...rows.map(row => Number(row.messages || 0)));
      $(selector).innerHTML = rows.length ? rows.map(row => {
        const label = row[labelKey] || "unknown";
        const value = Number(row.messages || 0);
        return `<div class="bar-row"><span>${escapeHtml(label)}</span><div class="bar"><span style="width:${Math.max(4, value / max * 100)}%"></span></div><strong>${value}</strong></div>`;
      }).join("") : `<p class="muted">還沒有資料。</p>`;
    }

    function scoreClass(score) {
      if (score >= 85) return "good";
      if (score >= 70) return "warn";
      return "bad";
    }

    function issuePills(issues) {
      const list = Array.isArray(issues) ? issues : [];
      if (!list.length) return `<span class="pill good">無明顯問題</span>`;
      return `<span class="issue-list">${list.slice(0, 4).map(issue => `<span class="pill ${issue.severity === "high" ? "danger" : ""}">${escapeHtml(issue.code || issue)}</span>`).join("")}</span>`;
    }

    function renderEvaluationDashboard(data) {
      evaluationScenarios = data.scenarios || evaluationScenarios;
      const options = Object.entries(evaluationScenarios).map(([key, item]) => `<option value="${escapeHtml(key)}">${escapeHtml(item.label || key)}</option>`).join("");
      if (options && !$("#evalScenario").options.length) {
        $("#evalScenario").innerHTML = options;
        syncEvaluationTurns();
      }
      const latest = (data.runs || [])[0];
      $("#evalLatestPill").textContent = latest ? `最近 ${latest.score} 分` : "尚未測試";
      $("#evalLatestPill").className = `pill ${latest && latest.score >= 85 ? "good" : ""}`;
      const metrics = latest ? [
        ["最近分數", `<span class="score ${scoreClass(latest.score)}">${latest.score}</span>`],
        ["測試輪數", Number(latest.turns || 0).toLocaleString()],
        ["高風險問題", Number(latest.metrics?.high_issues || 0).toLocaleString()],
        ["平均延遲", `${Number(latest.metrics?.avg_latency_ms || 0).toLocaleString()} ms`],
        ["模式", latest.mode === "llm" ? "LLM 測試官" : "固定劇本"],
        ["場景", evaluationScenarios[latest.scenario]?.label || latest.scenario]
      ] : [
        ["最近分數", `<span class="score">-</span>`],
        ["測試輪數", "0"],
        ["高風險問題", "0"]
      ];
      $("#evalMetrics").innerHTML = metrics.map(([label, value]) => `<div class="metric eval-metric"><span>${label}</span><strong>${value}</strong></div>`).join("");
      const trend = data.score_trend || [];
      $("#evalTrend").innerHTML = trend.length ? trend.map(item => `
        <div class="bar-row">
          <span>${fmt(item.created_at)}</span>
          <div class="bar"><span style="width:${Math.max(4, Number(item.score || 0))}%"></span></div>
          <strong>${Number(item.score || 0)}</strong>
        </div>
      `).join("") : `<p class="muted">還沒有評估趨勢。</p>`;
      $("#evalRunRows").innerHTML = (data.runs || []).map(item => `
        <tr>
          <td>${fmt(item.created_at)}</td>
          <td>${item.mode === "llm" ? "LLM" : "固定"}</td>
          <td>${escapeHtml(evaluationScenarios[item.scenario]?.label || item.scenario)}</td>
          <td><span class="score ${scoreClass(item.score)}" style="font-size:20px;">${Number(item.score || 0)}</span></td>
          <td>${issuePills(item.issues)}</td>
        </tr>
      `).join("") || `<tr><td colspan="5" class="muted">尚無評估資料</td></tr>`;
      $("#evalMessageRows").innerHTML = (data.latest_messages || []).map(item => `
        <tr>
          <td>${Number(item.turn || 0)}</td>
          <td>${escapeHtml(item.role)}</td>
          <td class="content">${escapeHtml(item.content).slice(0, 240)}${item.role === "assistant" ? issuePills(item.issues) : ""}</td>
          <td>${item.score == null ? "-" : `<span class="score ${scoreClass(item.score)}" style="font-size:18px;">${Number(item.score)}</span>`}</td>
        </tr>
      `).join("") || `<tr><td colspan="4" class="muted">跑一次測試後會顯示逐輪對話。</td></tr>`;
    }

    async function loadEvaluations() {
      const data = await request("/api/admin/evaluations");
      renderEvaluationDashboard(data);
    }

    function syncEvaluationTurns() {
      $("#evalTurns").min = "30";
      $("#evalTurns").max = "90";
      $("#evalTurns").value = String(Math.max(30, Math.min(Number($("#evalTurns").value || 60), 90)));
    }

    async function runEvaluation(mode) {
      const scenario = $("#evalScenario").value || "core";
      const turns = Math.max(30, Math.min(Number($("#evalTurns").value || 60), 90));
      $("#runScriptedBtn").disabled = true;
      $("#runLlmBtn").disabled = true;
      $("#evalStatus").textContent = mode === "llm" ? "LLM 測試官正在和 Samantha 對話..." : "固定劇本正在測試 Samantha...";
      try {
        const data = await request("/api/admin/evaluations/run", {
          method: "POST",
          body: JSON.stringify({ mode, scenario, turns })
        });
        renderEvaluationDashboard(data.dashboard || data);
        $("#evalStatus").textContent = `完成：${data.run.summary}`;
      } catch (error) {
        $("#evalStatus").textContent = `測試失敗：${error.message}`;
      } finally {
        $("#runScriptedBtn").disabled = false;
        $("#runLlmBtn").disabled = false;
      }
    }

    function renderTables(data) {
      $("#messageRows").innerHTML = data.recent_messages.map(item => `
        <tr>
          <td>${fmt(item.created_at)}</td>
          <td>${escapeHtml(item.email || item.display_name || "-")}</td>
          <td>${escapeHtml(item.role)}</td>
          <td class="content">${escapeHtml(item.content).slice(0, 260)}</td>
          <td><span class="pill ${item.safety === "crisis" ? "danger" : ""}">${escapeHtml(item.safety || item.provider || "-")}</span></td>
        </tr>
      `).join("");
      $("#userRows").innerHTML = data.recent_users.map(item => `
        <tr><td>${fmt(item.created_at)}</td><td>${escapeHtml(item.email)}</td><td>${escapeHtml(item.display_name)}</td></tr>
      `).join("");
      $("#relationshipRows").innerHTML = (data.relationships || []).map(item => `
        <tr>
          <td>${escapeHtml(item.email || item.display_name || "-")}</td>
          <td>${escapeHtml(item.lover_name || item.character_key || "-")}</td>
          <td>${Number(item.intimacy || 0)}</td>
          <td>${Number(item.trust || 0)}</td>
          <td>${Number(item.conversation_count || 0)}</td>
          <td>${escapeHtml(item.last_emotion || "-")}</td>
        </tr>
      `).join("") || `<tr><td colspan="6" class="muted">尚無角色關係資料</td></tr>`;
      $("#emotionRows").innerHTML = (data.recent_emotion_events || []).map(item => `
        <tr>
          <td>${fmt(item.created_at)}</td>
          <td>${escapeHtml(item.email || item.display_name || "-")}</td>
          <td>${escapeHtml(item.primary_emotion || "-")}</td>
          <td>${Number(item.intensity || 0)}</td>
          <td>${escapeHtml(item.emotional_need || "-")}</td>
        </tr>
      `).join("") || `<tr><td colspan="5" class="muted">尚無情緒事件</td></tr>`;
    }

    async function loadStats() {
      const data = await request("/api/admin/stats");
      $("#loginPanel").classList.add("hidden");
      $("#dashboard").classList.remove("hidden");
      $("#adminName").textContent = data.user.email;
      $("#statusPill").textContent = "已連線";
      $("#updatedAt").textContent = `更新時間：${fmt(Date.now())}`;
      renderMetrics(data.overview);
      renderBars("#dailyBars", data.daily, "day");
      renderBars("#providerBars", data.providers, "provider");
      renderBars("#emotionBars", (data.emotion_distribution || []).map(item => ({ emotion: item.emotion, messages: item.events })), "emotion");
      renderBars("#emotionDailyBars", (data.emotion_daily || []).map(item => ({ day: item.day, messages: item.avg_intensity })), "day");
      renderTables(data);
      await loadEvaluations().catch(error => {
        $("#evalStatus").textContent = `評估資料載入失敗：${error.message}`;
      });
    }

    $("#loginBtn").addEventListener("click", login);
    $("#password").addEventListener("keydown", event => { if (event.key === "Enter") login(); });
    $("#refreshBtn").addEventListener("click", loadStats);
    $("#logoutBtn").addEventListener("click", logout);
    $("#runScriptedBtn").addEventListener("click", () => runEvaluation("scripted"));
    $("#runLlmBtn").addEventListener("click", () => runEvaluation("llm"));
    $("#evalScenario").addEventListener("change", syncEvaluationTurns);
    loadStats().catch(error => {
      $("#loginStatus").textContent = error.message === "Admin access required"
        ? "目前登入帳號不是管理員。"
        : "請先登入管理員帳號。";
    });
  </script>
</body>
</html>
