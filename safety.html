<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>安全說明｜雲端戀人</title>
  <style>
    body { margin: 0; font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, sans-serif; color: #f6f2ea; background: #101416; line-height: 1.7; }
    main { max-width: 820px; margin: 0 auto; padding: 40px 20px; }
    a { color: #3ed4c7; }
    h1 { font-size: 30px; }
    h2 { margin-top: 28px; font-size: 18px; }
    .urgent { border-left: 4px solid #ff6b6b; background: rgba(255,107,107,.09); border-radius: 0 8px 8px 0; padding: 14px; }
  </style>
</head>
<body>
  <main>
    <p><a href="/">回到雲端戀人</a></p>
    <h1>安全說明</h1>

    <div class="urgent">
      <strong>如果你或身邊的人有立即危險：</strong>
      <p>請立刻聯絡當地緊急服務、可信任的人、或專業心理支持資源。不要只依靠 AI 對話。</p>
    </div>

    <h2>健康邊界</h2>
    <p>雲端戀人可以陪你聊天、整理感受、提供溫柔提醒，但不應取代朋友、家人、伴侶、心理師或其他現實支持。</p>

    <h2>依賴風險</h2>
    <p>如果你發現自己越來越難離開 AI、只想和 AI 說話、或因此疏遠現實關係，建議暫停使用，並主動聯絡現實中的可信任對象。</p>

    <h2>模型限制</h2>
    <p>AI 可能誤解你的語氣、產生不準確的回覆或漏判風險。系統會盡力分流危機與依賴風險，但不能保證完全正確。</p>
  </main>
</body>
</html>
