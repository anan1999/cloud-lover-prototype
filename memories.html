<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Samantha Memory</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10181a;
      --panel: #172124;
      --line: #334044;
      --text: #f3f1ea;
      --muted: #aeb8b8;
      --accent: #55d5ca;
      --danger: #ff8b7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    main {
      width: min(1040px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }
    h1 { margin: 0 0 6px; font-size: 28px; }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    a, button {
      color: var(--text);
      border: 1px solid var(--line);
      background: #202b2e;
      border-radius: 8px;
      padding: 10px 14px;
      text-decoration: none;
      cursor: pointer;
      font: inherit;
    }
    button.primary { background: var(--accent); color: #071313; border-color: var(--accent); font-weight: 700; }
    button.danger { border-color: var(--danger); color: var(--danger); }
    .toolbar, .editor, .memory {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .editor {
      display: grid;
      grid-template-columns: 1fr 190px auto;
      gap: 10px;
      align-items: end;
    }
    label { display: grid; gap: 6px; color: var(--muted); }
    input, select, textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #202b2e;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    .memory {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }
    .status { min-height: 24px; margin: 12px 0; color: var(--muted); }
    @media (max-width: 760px) {
      header, .memory { display: block; }
      .editor { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; margin-top: 12px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Samantha Memory</h1>
        <p>管理 Samantha 可以使用的長期記憶。她應該記得重要的事，也要讓你能改、刪、或要求不要再提。</p>
      </div>
      <a href="/">回聊天</a>
    </header>

    <section class="toolbar">
      <button class="primary" id="refreshBtn">重新載入</button>
      <button id="exportBtn">匯出資料</button>
      <button class="danger" id="clearBtn">清空記憶</button>
    </section>

    <section class="editor">
      <label>新增記憶
        <input id="newContent" placeholder="例如：我喜歡短一點、自然一點的回答。">
      </label>
      <label>類型
        <select id="newType">
          <option value="preference_memory">偏好</option>
          <option value="profile_memory">身份資料</option>
          <option value="episodic_memory">事件</option>
          <option value="emotional_memory">情緒脈絡</option>
          <option value="open_loop_memory">未完成話題</option>
          <option value="boundary_memory">界線</option>
        </select>
      </label>
      <button class="primary" id="addBtn">加入</button>
    </section>

    <div class="status" id="status"></div>
    <section id="list"></section>
  </main>

  <script>
    const $ = selector => document.querySelector(selector);
    const typeLabel = {
      profile_memory: "身份資料",
      preference_memory: "偏好",
      episodic_memory: "事件",
      emotional_memory: "情緒脈絡",
      open_loop_memory: "未完成話題",
      boundary_memory: "界線"
    };

    async function api(path, options = {}) {
      const response = await fetch(path, {
        credentials: "include",
        headers: options.body ? { "Content-Type": "application/json" } : {},
        ...options
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
      return data;
    }

    function setStatus(text) {
      $("#status").textContent = text || "";
    }

    function render(memories) {
      $("#list").innerHTML = memories.map(item => `
        <article class="memory">
          <div>
            <textarea data-content="${item.id}" rows="3">${escapeHtml(item.content)}</textarea>
            <div class="meta">
              <span class="pill">${escapeHtml(typeLabel[item.memory_type] || item.memory_type)}</span>
              <span>importance ${Number(item.importance_score || 0)}</span>
              <span>confidence ${Number(item.confidence_score || 0)}</span>
              <span>${escapeHtml(item.status || "active")}</span>
            </div>
          </div>
          <div class="actions">
            <button data-action="update" data-id="${item.id}">儲存</button>
            <button data-action="incorrect" data-id="${item.id}">標錯</button>
            <button data-action="do_not_mention" data-id="${item.id}">不要再提</button>
            <button class="danger" data-action="delete" data-id="${item.id}">刪除</button>
          </div>
        </article>
      `).join("") || `<p>目前還沒有長期記憶。</p>`;
    }

    function escapeHtml(text) {
      return String(text ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[char]);
    }

    async function load() {
      setStatus("載入中...");
      const data = await api("/api/user/memories");
      render(data.memories || []);
      setStatus(`已載入 ${(data.memories || []).length} 條記憶。`);
    }

    async function mutate(body) {
      const data = await api("/api/user/memories", { method: "POST", body: JSON.stringify(body) });
      render(data.memories || []);
      setStatus("已更新。");
    }

    $("#addBtn").addEventListener("click", () => {
      const content = $("#newContent").value.trim();
      if (!content) return;
      mutate({ action: "create", content, memory_type: $("#newType").value }).then(() => {
        $("#newContent").value = "";
      }).catch(error => setStatus(error.message));
    });
    $("#refreshBtn").addEventListener("click", () => load().catch(error => setStatus(error.message)));
    $("#clearBtn").addEventListener("click", () => {
      if (confirm("確定要清空所有 Samantha 長期記憶嗎？聊天紀錄不會被刪除。")) {
        mutate({ action: "clear" }).catch(error => setStatus(error.message));
      }
    });
    $("#exportBtn").addEventListener("click", async () => {
      const data = await api("/api/user/memories/export");
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "samantha-memory-export.json";
      link.click();
      URL.revokeObjectURL(url);
    });
    $("#list").addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const id = button.dataset.id;
      const action = button.dataset.action;
      const content = document.querySelector(`[data-content="${id}"]`)?.value || "";
      mutate(action === "update" ? { action, id, content } : { action, id }).catch(error => setStatus(error.message));
    });
    load().catch(error => setStatus(error.message));
  </script>
</body>
</html>
